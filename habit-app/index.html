<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Habit App</title>

  <link rel="stylesheet" href="style.css">

  <!-- PWA設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#222222">
</head>
<body>

  <div class="app">
    <h1>今日の成長</h1>

    <div class="status">
      <p>Lv.<span id="level">1</span></p>
      <p>ポイント: <span id="point">0</span>pt</p>
      <p>継続: <span id="streak">0</span>日</p>
      <p>今日の達成率: <span id="progress">0</span>%</p>
    </div>

    <!-- 🌱 木の表示 -->
    <div id="tree" style="font-size: 60px; text-align: center;">
      🌱
    </div>

    <h2>今日のタスク</h2>

    <ul id="task-list"></ul>

    <div class="add-task">
      <h2>タスク追加</h2>

      <input type="text" id="task-title" placeholder="タスク名">
      <input type="number" id="task-point" placeholder="ポイント">

      <button onclick="addTask()">追加</button>
    </div>

    <!-- リセットボタン -->
    <div style="margin-top: 20px;">
      <button onclick="resetData()" style="background: red;">
        リセット
      </button>
    </div>

  </div>

  <script src="script.js"></script>

  <!-- Service Worker登録 -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
